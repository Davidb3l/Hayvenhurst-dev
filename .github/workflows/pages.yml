name: Docs site (GitHub Pages)

# Build and deploy the documentation site (lives under docs/) to GitHub Pages.
# Per PRD section P0.7. The docs/ directory is empty at v0.0 — this workflow is
# a skeleton that will become meaningful once the Astro docs source lands.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Pages deployments require these two permissions; the third lets the deploy
# step authenticate against the Pages OIDC endpoint.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time, latest wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build site
        working-directory: docs
        run: |
          # Placeholder: docs/ is empty in v0.0. Once an Astro project lands
          # here, replace this block with `bun install && bun run build` and
          # point upload-pages-artifact at docs/dist.
          if [ -f package.json ]; then
            bun install --frozen-lockfile
            bun run build
          else
            echo "docs/ has no build yet — publishing an empty placeholder."
            mkdir -p dist
            cat > dist/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head><meta charset="utf-8"><title>Hayvenhurst</title></head>
            <body><h1>Hayvenhurst docs are coming soon.</h1></body>
          </html>
          EOF
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
