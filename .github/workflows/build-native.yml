name: Build native (cross-platform)

# Cross-compile hayven-native for all 5 supported platforms on every push, so
# platform-specific breakage surfaces immediately rather than at release time.
# Per PRD section P0.7 and 4.9.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-native-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (glibc) — native build on the Linux runner.
          - platform: linux-x64-glibc
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
            artifact_name: hayven-native
          # Linux ARM64 — use `cross` on the Linux runner so we don't pay for
          # ARM runners and don't try to cross-compile from macOS.
          - platform: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            artifact_name: hayven-native
          # macOS x64 (Intel Macs) — Apple Silicon runners can cross-compile to
          # x86_64-apple-darwin without `cross`; the rustup target is enough.
          - platform: macos-x64
            runner: macos-14
            target: x86_64-apple-darwin
            use_cross: false
            artifact_name: hayven-native
          # macOS ARM64 (Apple Silicon) — native build on the M-series runner.
          - platform: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            use_cross: false
            artifact_name: hayven-native
          # Windows x64 — native build.
          - platform: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            artifact_name: hayven-native.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (cargo)
        if: matrix.use_cross == false
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        working-directory: native
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hayven-native-${{ matrix.platform }}
          path: native/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14
